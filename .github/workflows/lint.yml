name: Lint and Build

on:
  pull_request:
    branches:
      - main
      - 'release_*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libjpeg-turbo8-dev libwebp-dev

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...
